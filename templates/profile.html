{% extends 'base.html' %}

{% block title %}Profile · Budget Tracker{% endblock %}

{% block content %}
  <div class="surface surface--pad surface--accent surface--accent-profile" style="max-width: 760px; margin: 0 auto;">
    <div class="header-row">
      <div>
        <h1 class="h1"><i class="fa-solid fa-user"></i> Profile</h1>
        <p class="sub">Manage your account details.</p>
      </div>
    </div>

    {% if message %}
      <div class="flash flash--success mt-12">{{ message }}</div>
    {% endif %}

    <form class="form mt-18" method="POST">
      <div class="field">
        <label class="label" for="username">Username</label>
        <input class="input" type="text" id="username" value="{{ user.username }}" disabled>
      </div>
      <div class="field">
        <label class="label" for="email">Email</label>
        <input class="input" type="email" id="email" name="email" value="{{ user.email }}" required>
      </div>
      <div class="field">
        <label class="label" for="password">New password</label>
        <input class="input" type="password" id="password" name="password" placeholder="Enter a new password" required>
        <div class="help">This app keeps the existing auth behavior as-is.</div>
      </div>
      <div class="field field--full">
        <button class="btn btn-primary" type="submit"><i class="fa-solid fa-check"></i> Update profile</button>
      </div>
    </form>
  </div>
{% endblock %}
