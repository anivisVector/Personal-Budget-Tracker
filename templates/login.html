{% extends 'base.html' %}

{% block title %}Login · Budget Tracker{% endblock %}

{% block content %}
  <div class="surface surface--pad" style="max-width: 520px; margin: 18px auto 0;">
    <div class="header-row">
      <div>
        <h1 class="h1"><i class="fa-solid fa-right-to-bracket"></i> Login</h1>
        <p class="sub">Welcome back — let’s continue tracking.</p>
      </div>
    </div>

    <form class="form" method="POST" action="/login">
      <div class="field field--full">
        <label class="label" for="username">Username</label>
        <input class="input" id="username" type="text" name="username" placeholder="Enter username" required />
      </div>

      <div class="field field--full">
        <label class="label" for="password">Password</label>
        <input class="input" id="password" type="password" name="password" placeholder="Enter password" required />
        <div class="help">
          <button class="btn btn-ghost btn-small" type="button" onclick="togglePassword('password')">
            <i class="fa-solid fa-eye"></i> Show/Hide
          </button>
        </div>
      </div>

      <div class="field field--full">
        <button class="btn btn-primary" type="submit"><i class="fa-solid fa-arrow-right"></i> Login</button>
      </div>
    </form>

    <p class="help mt-18">Don’t have an account? <a href="{{ url_for('register') }}">Create one</a>.</p>
  </div>
{% endblock %}

{% block scripts %}
  <script>
    function togglePassword(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }
  </script>
{% endblock %}
