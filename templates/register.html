{% extends 'base.html' %}

{% block title %}Register · Budget Tracker{% endblock %}

{% block content %}
  <div class="surface surface--pad" style="max-width: 560px; margin: 18px auto 0;">
    <div class="header-row">
      <div>
        <h1 class="h1"><i class="fa-solid fa-user-plus"></i> Create account</h1>
        <p class="sub">One place to track income, expenses, and budgets.</p>
      </div>
    </div>

    <form class="form" method="POST" action="/register">
      <div class="field">
        <label class="label" for="username">Username</label>
        <input class="input" id="username" type="text" name="username" placeholder="e.g., vishn" required />
      </div>
      <div class="field">
        <label class="label" for="email">Email</label>
        <input class="input" id="email" type="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="field field--full">
        <label class="label" for="password">Password</label>
        <input class="input" id="password" type="password" name="password" placeholder="Choose a password" required />
        <div class="help">Tip: use a memorable phrase + numbers.</div>
      </div>
      <div class="field field--full">
        <button class="btn btn-primary" type="submit"><i class="fa-solid fa-arrow-right"></i> Register</button>
      </div>
    </form>

    <p class="help mt-18">Already have an account? <a href="{{ url_for('login') }}">Login</a>.</p>
  </div>
{% endblock %}
